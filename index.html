<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENMA | O Pão Perfeito</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Cabeçalho Fixo -->
    <header id="header">
        <nav>
            <button id="menuFormulario">Formulário</button>
        </nav>
    </header>

    <!-- Seção Hero Principal -->
    <main class="hero">
        <div class="bread-container">
            <!-- Usaremos um SVG para o pão, não precisa de imagem externa -->
            <svg class="gold-bread" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="100" cy="60" rx="95" ry="55" fill="#d4af37"/>
                <ellipse cx="100" cy="55" rx="85" ry="45" fill="#e6c963"/>
                <ellipse cx="100" cy="52" rx="70" ry="35" fill="#dbb748"/>
            </svg>
            <div class="particles" id="particlesContainer"></div>
        </div>

        <h1>ENMA</h1>
        <p>O pão como ele deve ser.</p>
    </main>

    <!-- Seção Formulário -->
    <section id="formulario">
        <div class="form-container">
            <h2>Quer receber o melhor pão?</h2>
            <p>Cadastre-se e seja o primeiro a saber quando lançarmos.</p>

            <form id="cadastroForm">
                <div class="form-group">
                    <label for="nome">Seu nome</label>
                    <input type="text" id="nome" placeholder="Digite seu nome completo" required>
                </div>

                <div class="form-group">
                    <label for="email">Seu e-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label>Como você gosta do seu pão?</label>
                    
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="pao" value="macio" required>
                            <span>Macio</span>
                        </label>
                        
                        <label class="radio-option">
                            <input type="radio" name="pao" value="crocante">
                            <span>Crocante</span>
                        </label>
                        
                        <label class="radio-option">
                            <input type="radio" name="pao" value="dourado">
                            <span>Bem dourado</span>
                        </label>
                        
                        <label class="radio-option">
                            <input type="radio" name="pao" value="tradicional">
                            <span>Tradicional</span>
                        </label>
                        
                        <label class="radio-option">
                            <input type="radio" name="pao" value="sementes">
                            <span>Com sementes</span>
                        </label>
                    </div>
                </div>

                <button type="submit" class="submit-btn">Cadastrar</button>
            </form>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
