<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENMA | O Pão Perfeito</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.png" type="image/png">
</head>
<body>

    <!-- Cabeçalho Fixo -->
    <header id="header">
        <nav>
            <button id="menuFormulario">Formulário</button>
        </nav>
    </header>

    <!-- Seção Hero Principal -->
    <main class="hero">
        <div class="bread-container">
            <!-- Usaremos um SVG para o pão, não precisa de imagem externa --> 
            <img src="https://png.pngtree.com/png-vector/20250726/ourlarge/pngtree-cartoon-loaf-of-bread-isolated-on-transparent-background-vector-png-image_16878956.webp" class="gold-bread" alt="Pão dourado ENMA">
            <div class="particles" id="particlesContainer"></div>
        </div>

        <h1>ENMA</h1>
        <p>O pão como ele deve ser.</p>
    </main>

    <!-- Seção Formulário -->
    <section id="formulario">
        <div class="form-container">
            <h2>Quer receber o melhor pão?</h2>
            <p>Cadastre-se e seja o primeiro a saber quando lançarmos.</p>

            <form id="cadastroForm">
                <div class="form-group">
                    <label for="nome">Seu nome</label>
                    <input type="text" id="nome" placeholder="Digite seu nome completo" required>
                </div>

                <div class="form-group">
                    <label for="email">Seu e-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label>Como você gosta do seu pão?</label>
                    
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="pao" value="macio" required>
                            <span>Macio</span>
                        </label>
                        
                        <label class="radio-option">
                            <input type="radio" name="pao" value="crocante">
                            <span>Crocante</span>
                        </label>
                        
                        <label class="radio-option">
                            <input type="radio" name="pao" value="dourado">
                            <span>Bem dourado</span>
                        </label>

                        <label class="radio-option">
                            <input type="radio" name="pao" value="Quase queimado">
                            <span>Quase queimado</span>
                        </label>
                        
                        <label class="radio-option">
                            <input type="radio" name="pao" value="Queimado">
                            <span>Queimado</span>
                        </label>
                        
                        <label class="radio-option">
                            <input type="radio" name="pao" value="tradicional">
                            <span>Tradicional</span>
                        </label>
                        
                        <label class="radio-option">
                            <input type="radio" name="pao" value="sementes">
                            <span>Com sementes</span>
                        </label>
                    </div>
                </div>

                <button type="submit" class="submit-btn">Cadastrar</button>
            </form>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
